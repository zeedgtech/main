<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satu Pertanyaan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum-deep:#2a1b3d;
    --plum-mid:#4a2f5e;
    --blush:#ffb4c6;
    --peach:#ffd6a5;
    --lavender:#c9b6ff;
    --cream:#fff6ee;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background: radial-gradient(ellipse at 30% 20%, var(--plum-mid) 0%, var(--plum-deep) 55%, #180f26 100%);
    font-family:'Quicksand', sans-serif;
    color: var(--cream);
  }

  .sky{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
  }

  .heart{
    position:absolute;
    bottom:-10%;
    font-size: 18px;
    opacity:0.55;
    color: var(--blush);
    animation: float linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,180,198,0.35));
  }

  @keyframes float{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.5; }
    100%{ transform: translateY(-115vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0; }
  }

  .stage{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card{
    position:relative;
    max-width:560px;
    width:100%;
    text-align:center;
    padding: 48px 36px 56px;
    border-radius: 28px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .eyebrow{
    font-size: 13px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--lavender);
    margin-bottom: 18px;
    opacity: 0.85;
  }

  .to{
    font-size: 15px;
    color: var(--peach);
    margin-bottom: 6px;
    opacity: 0.9;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size: clamp(2rem, 6vw, 3.1rem);
    line-height: 1.25;
    margin: 4px 0 10px;
    background: linear-gradient(90deg, var(--blush), var(--peach) 50%, var(--lavender));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .sub{
    font-size: 15px;
    color: rgba(255,246,238,0.75);
    margin-bottom: 38px;
  }

  .buttons{
    position:relative;
    display:flex;
    gap:18px;
    justify-content:center;
    align-items:center;
    min-height: 90px;
  }

  button{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    border:none;
    cursor:pointer;
    border-radius: 999px;
    transition: transform 0.15s ease, box-shadow 0.2s ease, font-size 0.25s ease, padding 0.25s ease;
  }

  #yes{
    padding: 16px 34px;
    font-size: 17px;
    color: #2a1b3d;
    background: linear-gradient(135deg, var(--peach), var(--blush));
    box-shadow: 0 8px 24px rgba(255,180,198,0.35);
  }

  #yes:hover{
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 12px 30px rgba(255,180,198,0.5);
  }

  #no{
    position: relative;
    padding: 16px 34px;
    font-size: 17px;
    color: var(--cream);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
  }

  #no.fixed-pos{
    position: fixed;
    z-index: 50;
  }

  .hint{
    margin-top: 22px;
    font-size: 13px;
    color: rgba(255,246,238,0.45);
    min-height: 18px;
  }

  .result{
    display:none;
    animation: pop 0.5s ease;
  }

  .result.show{ display:block; }

  @keyframes pop{
    0%{ transform: scale(0.7); opacity:0; }
    100%{ transform: scale(1); opacity:1; }
  }

  .result h2{
    font-family:'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    color: var(--peach);
    margin: 0 0 8px;
  }

  .result p{
    color: rgba(255,246,238,0.8);
    font-size: 15px;
  }

  .confetti{
    position:fixed;
    top:-10px;
    width:8px;
    height:14px;
    opacity:0.9;
    pointer-events:none;
    animation: fall linear forwards;
    z-index: 60;
  }

  @keyframes fall{
    to{ transform: translateY(110vh) rotate(540deg); opacity:0.2; }
  }

  @media (prefers-reduced-motion: reduce){
    .heart{ animation: none; opacity:0.3; }
  }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<div class="stage">
  <div class="card">
    <div class="eyebrow">survei kejujuran</div>
    <div class="to">jujur aja, ga usah bohong,</div>
    <h1>apakah kamu<br>gay?</h1>
    <div class="sub">pilih salah satu jawaban di bawah.</div>

    <div id="askBlock">
      <div class="buttons">
        <button id="yes" onclick="sayYes()">Iya</button>
        <button id="no" onclick="sayNo()">Nggak</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>

    <div class="result" id="result">
      <h2 id="resultTitle">Wkwkwk Ketahuan 🏳️‍🌈</h2>
      <p id="resultText">udah ngaku aja ges wkwk. makasih kejujurannya!</p>
    </div>
  </div>
</div>

<script>
  // Ambient floating hearts (bisa diganti jadi emoji lain kalo mau)
  const sky = document.getElementById('sky');
  const heartChars = ['🏳️‍🌈', '✨', '💅'];
  for(let i=0;i<22;i++){
    const h = document.createElement('div');
    h.className='heart';
    h.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
    h.style.left = Math.random()*100+'%';
    h.style.fontSize = (12 + Math.random()*20)+'px';
    h.style.setProperty('--drift', (Math.random()*140-70)+'px');
    h.style.animationDuration = (9 + Math.random()*10)+'s';
    h.style.animationDelay = (Math.random()*10)+'s';
    sky.appendChild(h);
  }

  const yesBtn = document.getElementById('yes');
  const noBtn = document.getElementById('no');
  const hint = document.getElementById('hint');

  let dodgeCount = 0;
  let yesScale = 1;

  const hints = [
    "eh, kok menghindar...",
    "jangan bohong deh",
    "gak usah ditutup-tutupin~",
    "kok makin jauh tombolnya",
    "tetep gabisa diklik kok",
    "udah, pilih 'Iya' aja wkwk",
    "nyerah aja bos",
  ];

  function rectsOverlap(x, y, w, h, rect, pad){
    return (
      x < rect.right + pad &&
      x + w > rect.left - pad &&
      y < rect.bottom + pad &&
      y + h > rect.top - pad
    );
  }

  function moveNoButton(clientX, clientY){
    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;
    const margin = 16;
    const maxX = window.innerWidth - w - margin;
    const maxY = window.innerHeight - h - margin;
    const yesRect = yesBtn.getBoundingClientRect();
    const safePad = 24;

    let x, y, tries = 0;
    do{
      x = margin + Math.random() * Math.max(1, maxX - margin);
      y = margin + Math.random() * Math.max(1, maxY - margin);
      tries++;
    } while (
      tries < 30 &&
      (
        rectsOverlap(x, y, w, h, yesRect, safePad) ||
        (clientX !== undefined && Math.hypot(x - clientX, y - clientY) < 160)
      )
    );

    noBtn.classList.add('fixed-pos');
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    dodgeCount++;
    
    // Bikin tombol 'Iya' makin gede tiap kali Nggak lari
    yesScale = Math.min(1.9, 1 + dodgeCount * 0.09);
    yesBtn.style.transform = `scale(${yesScale})`;
    yesBtn.style.fontSize = (17 + dodgeCount) + 'px';

    if(dodgeCount <= hints.length){
      hint.textContent = hints[dodgeCount-1];
    } else {
      hint.textContent = "mending ngaku aja lu wkwk";
    }
  }

  // Bikin tombol Nggak menghindar saat di-hover atau di-sentuh (di HP)
  noBtn.addEventListener('mouseenter', (e)=> moveNoButton(e.clientX, e.clientY));
  noBtn.addEventListener('touchstart', (e)=>{
    e.preventDefault();
    const t = e.touches[0];
    moveNoButton(t.clientX, t.clientY);
  }, {passive:false});

  function sayNo(){
    // Kalau somehow berhasil keklik (misal pake keyboard tab), tetep disuruh pindah
    moveNoButton();
  }

  function sayYes(){
    document.getElementById('askBlock').style.display = 'none';
    const result = document.getElementById('result');
    result.classList.add('show');
    launchConfetti();
  }

  function launchConfetti(){
    const colors = ['#ffb4c6','#ffd6a5','#c9b6ff','#fff6ee'];
    for(let i=0;i<80;i++){
      setTimeout(()=>{
        const c = document.createElement('div');
        c.className='confetti';
        c.style.left = Math.random()*100+'vw';
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration = (2.5 + Math.random()*2)+'s';
        c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 5000);
      }, i*25);
    }
  }
</script>

</body>
</html>
